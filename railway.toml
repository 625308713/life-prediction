[build]
builder = "nixpacks"
buildCommand = "cd life-predictor/backend && npm ci && npx prisma generate && npm run build && cd ../frontend && npm ci && npm run build"
watchPatterns = ["life-predictor/backend/src/**", "life-predictor/frontend/src/**", "life-predictor/backend/prisma/**"]

[deploy]
startCommand = "cd life-predictor/backend && npx prisma migrate deploy && node dist/index.js"
healthcheckPath = "/api/health"
restartPolicyMaxRetries = 3

[service]
port = 3001

# ---- 以下变量在 Railway Dashboard 中设置 ----
# Railway 会自动注入 DATABASE_URL（添加 PostgreSQL 插件后）
# 你需要手动设置：
#   ADMIN_PASSWORD — 后台管理密码（必填）
#   AI_API_BASE_URL — AI API 地址（可选）
#   AI_API_KEY — AI API 密钥（可选）
#   AI_MODEL — AI 模型名（可选）
[variables]
NODE_ENV = "production"
PORT = "3001"
