[build]
builder = "nixpacks"
buildCommand = "cd backend && npm ci && npx prisma generate && npm run build && cd ../frontend && npm ci && npm run build"
watchPatterns = ["backend/src/**", "frontend/src/**", "backend/prisma/**"]

[deploy]
startCommand = "cd backend && npx prisma migrate deploy && node dist/index.js"
healthcheckPath = "/api/health"
restartPolicyMaxRetries = 3

[service]
port = 3001

# ---- 以下变量在 Railway Dashboard 中设置 ----
# Railway 会自动注入 DATABASE_URL（添加 PostgreSQL 插件后）
# 你需要手动设置以下变量：
#
#   ADMIN_PASSWORD     — 后台管理密码（必填）
#   AI_API_BASE_URL    — AI API 地址（可选）
#   AI_API_KEY         — AI API 密钥（可选）
#   AI_MODEL           — AI 模型名（可选，默认 claude-sonnet-4-20250514）
#
# 以下两个变量由 Railway 自动设置，此处仅为默认值：
[variables]
NODE_ENV = "production"
PORT = "3001"
