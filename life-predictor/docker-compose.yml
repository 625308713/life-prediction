version: "3.8"

services:
  postgres:
    image: postgres:16-alpine
    container_name: life-predictor-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: lifepredictor
      POSTGRES_PASSWORD: lifepredictor_pwd
      POSTGRES_DB: lifepredictor
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lifepredictor"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: life-predictor-app
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      DATABASE_URL: postgresql://lifepredictor:lifepredictor_pwd@postgres:5432/lifepredictor
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-admin123}
      # Optional. Must be an OpenAI-compatible chat completions endpoint.
      AI_API_BASE_URL: ${AI_API_BASE_URL:-}
      AI_API_KEY: ${AI_API_KEY:-}
      AI_MODEL: ${AI_MODEL:-}
      PORT: "3001"
      NODE_ENV: production
      FRONTEND_URL: ""
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata:
